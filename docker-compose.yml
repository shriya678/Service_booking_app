# Spins up a local Postgres for development.
# Run from the project root:
#   docker compose up -d        # start in background
#   docker compose down         # stop (data is preserved in the volume)
#   docker compose down -v      # stop AND wipe the data volume (fresh start)

services:
  postgres:
    image: postgres:16-alpine
    container_name: service-booking-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: app
      POSTGRES_PASSWORD: app
      POSTGRES_DB: service_booking
    ports:
      # host_port:container_port — Postgres inside the container listens on 5432,
      # we expose it on the host's 5432 so Node (running outside Docker) can connect.
      - "5433:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
